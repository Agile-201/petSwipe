services:
  # Go-сервис (аутентификация, чат, пользователи)
  - name: go-service
    rootDir: backend/Go-service
    type: web
    runtime: image
    repo: https://github.com/Agile-201/petSwipe
    dockerfilePath: Dockerfile.api
    dockerContext: .
    plan: free
    envVars:
      - key: API_ADDRESS
        value: :8080
      - key: LOG_LEVEL
        value: DEBUG
      - key: TOKEN_TTL
        value: 24h
      - key: POSTGRES_HOST
        fromDatabase:
          name: pet-db
          property: host
      - key: POSTGRES_PORT
        fromDatabase:
          name: pet-db
          property: port
      - key: POSTGRES_USER
        fromDatabase:
          name: pet-db
          property: user
      - key: POSTGRES_PASSWORD
        fromDatabase:
          name: pet-db
          property: password
      - key: POSTGRES_DB
        fromDatabase:
          name: pet-db
          property: database
      # Добавьте другие переменные из вашего .env.example
      - key: JWT_SECRET
        sync: false  # задаёте вручную через панель Render
    healthCheckPath: /health
    numReplicas: 1

  # C++-сервис (питомцы, свайпы)
  - name: cpp-service
    rootDir: backend/C-service
    type: web
    runtime: image
    repo: https://github.com/Agile-201/petSwipe
    dockerfilePath: Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: POSTGRES_HOST
        fromDatabase:
          name: pet-db
          property: host
      - key: POSTGRES_PORT
        fromDatabase:
          name: pet-db
          property: port
      - key: POSTGRES_USER
        fromDatabase:
          name: pet-db
          property: user
      - key: POSTGRES_PASSWORD
        fromDatabase:
          name: pet-db
          property: password
      - key: POSTGRES_DB
        fromDatabase:
          name: pet-db
          property: database
      - key: JWT_SECRET
        sync: false
    healthCheckPath: /health  # если ваш C++ сервис отдаёт /health
    numReplicas: 1

  # Nginx – reverse proxy
  - name: nginx
    rootDir: backend
    type: web
    runtime: image
    repo: https://github.com/Agile-201/petSwipe
    dockerfilePath: nginx.Dockerfile   # создадим отдельный Dockerfile для nginx
    dockerContext: .
    plan: free
    envVars: []
    healthCheckPath: /health
    numReplicas: 1

databases:
  - name: pet-db
    databaseName: petswipe
    plan: free   # бесплатный managed PostgreSQL (512 MB)
    ipAllowList: []  # разрешить доступ только из сервисов Render