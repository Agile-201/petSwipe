upstream go_backend {
    server go_service:8080;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 100M;

    location /health {
        access_log off;
        return 200 "Gateway OK\n";
        add_header Content-Type application/json;
    }

    location /api/auth/ {
        proxy_pass http://go_backend/api/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/chat/ {
        proxy_pass http://go_backend/api/chat/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/users/ {
        proxy_pass http://go_backend/api/users/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ping {
        proxy_pass http://go_backend/api/ping;
    }

    location / {
        return 404;
    }
}