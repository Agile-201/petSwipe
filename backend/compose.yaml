version: "3.9"

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: postgres_hackathon
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./Go-service/api/migration:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s
    networks:
      - petswipe

  # Go Service (Auth, Chat, User management)
  go_service:
    build:
      context: ./Go-service
      dockerfile: Dockerfile.api
    container_name: go_service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      API_ADDRESS: :8080
      LOG_LEVEL: DEBUG
      TOKEN_TTL: 24h
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - petswipe
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      retries: 3
      timeout: 5s
      start_period: 10s

  # C++ Service (Pet management, Swipes)
  cpp_service:
    build:
      context: ./C-service
      dockerfile: Dockerfile
    container_name: cpp_service
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8081"
    networks:
      - petswipe

  # Nginx Gateway
  nginx:
    image: nginx:alpine
    container_name: nginx_gateway
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      go_service:
        condition: service_healthy
      cpp_service:
        condition: service_started
    networks:
      - petswipe

  # PgAdmin (dev / demo only)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - petswipe

volumes:
  postgres_data:

networks:
  petswipe:
    driver: bridge